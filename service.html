<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>株式会社 井伊設備 ｜ 事業内容</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="favicon2.png" type="image/png">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: #333;
      background: #fff;
    }

    .inner {
      width: 90%;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ヘッダー（統一） */
    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid #eee;
      z-index: 10;
    }
    header .inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 50px;
      font-family: "HGP行書体", "HG行書体", serif;
      font-weight: bold;
    }
    .logo-icon {
      width: 100px;
      height: 100px;
    }
    .logo a {
      color: inherit;
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-size: 25px;
      font-family: "HGP行書体", "HG行書体", serif;
    }

    /* ページタイトル */
    .page-title {
      text-align: center;
      padding: 50px 0 40px;
      font-family: "HGP行書体", "HG行書体", serif;
      color: #004D24;
    }
    .page-title h2 {
      font-size: 90px;
    }

    /* 事業内容 */
    .service {
      margin-bottom: 50px;
    }
    .service h3 {
      font-size: 45px;
      font-family: "HGP行書体", "HG行書体", serif;
      color: #004D24;
    }
    .service p {
      font-size: 30px;
      padding-left: 10px;
    }

    /* フッター（統一） */
    footer {
      background: #222;
      color: #fff;
      text-align: center;
      padding: 80px 0;
      line-height: 1.8;
    }
    .footer-info h1 { font-size: 42px; margin: 5px 0; }
    .footer-info h2 { font-size: 20px; margin: 5px 0; }
    .footer-info h3 { font-size: 20px; margin: 5px 0; }
    .footer-info p  { font-size: 12px; margin: 10px 0 0; }

    /* スマホ縦画面対応 */
    @media screen and (max-width: 768px) {

      header .inner {
        flex-direction: column;
        align-items: flex
