<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>株式会社 井伊設備 ｜ 公式HP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="favicon2.png" type="image/png">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: #333;
      background: #fff;
    }

    .inner {
      width: 90%;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* 背景スライダー（縦画面でも安全） */
    .bg-slider {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .bg-slider .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      animation: fade 36s infinite;
    }
    .bg-slider .slide:nth-child(1) { animation-delay: 0s; }
    .bg-slider .slide:nth-child(2) { animation-delay: 6s; }
    .bg-slider .slide:nth-child(3) { animation-delay: 12s; }
    .bg-slider .slide:nth-child(4) { animation-delay: 18s; }
    .bg-slider .slide:nth-child(5) { animation-delay: 24s; }
    .bg-slider .slide:nth-child(6) { animation-delay: 30s; }

    .bg-slider img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes fade {
      0% { opacity: 0; }
      10% { opacity: 1; }
      30% { opacity: 1; }
      40% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* ヘッダー（会社概要ページと完全一致） */
    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid #eee;
      z-index: 10;
    }
    header .inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 50px;
      font-family: "HGP行書体", "HG行書体", serif;
      font-weight: bold;
    }
    .logo-icon {
      width: 100px;
      height: 100px;
    }
    .logo a {
      color: inherit;
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-size: 25px;
      font-family: "HGP行書体", "HG行書体", serif;
    }

    /* メインビジュアル（縦画面最適化） */
    .main-visual {
      text-align: center;
      padding: 120px 0 180px;
      color: #004D24;
      font-family: "HGP行書体", "HG行書体", serif;
      position: relative;
      z-index: 2;
    }
    .main-visual h2 {
      font-size: 70px;
      margin-bottom: 20px;
    }
    .main-visual p {
      font-size: 32px;
    }

    /* フッター（会社概要ページと完全一致） */
    footer {
      background: #222;
      color: #fff;
      text-align: center;
      padding: 80px 0;
      line-height: 1.8;
      position: relative;
      z-index: 2;
    }
    .footer-info h1 { font-size: 42px; margin: 5px 0; }
    .footer-info h2 { font-size: 20px; margin: 5px 0; }
    .footer-info h3 { font-size: 20px; margin: 5px 0; }
    .footer-info p  { font-size: 12px; margin: 10px 0 0; }

    /* スマホ縦画面対応（最重要） */
    @media screen and (max-width: 768px) {

      header .inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .logo {
        font-size: 28px;
      }
      .logo-icon {
        width: 60px;
        height: 60px;
      }

      nav {
        margin-top: 5px;
      }
      nav a {
        font-size: 18px;
        margin-left: 10px;
      }

      .main-visual {
        padding: 100px 0 140px;
      }
      .main-visual h2 {
        font-size: 40px;
      }
      .main-visual p {
        font-size: 20px;
      }

      .footer-info h1 { font-size: 22px; }
      .footer-info h2 { font-size: 16px; }
      .footer-info h3 { font-size: 16px; }
      .footer-info p  { font-size: 10px; }
    }
  </style>
</head>

<body>

<!-- 背景スライダー -->

<!-- メインビジュアル -->

  </div>

    <p>株式会社 井伊設備　©Ii Setsubi Co., Ltd.</p>
  </div>
</footer>

</body>
</html>
